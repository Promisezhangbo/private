# ==============================================
# 纯静态部署：跳过所有构建，直接发布本地 dist
# ==============================================
[build]
  # 跳过构建（不安裝依赖、不执行打包）
  command = "# skip build"
  # 直接发布你提交到 Git 的 dist 文件夹
  publish = "dist"

# ==============================================
# SPA 路由（解决刷新 404，monorepo 多应用必备）
# ==============================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false