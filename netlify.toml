# Netlify：发布目录为仓库根下的 dist（Turbo 各 app 的 outDir 指向 ../../dist/<app>）
#
# 重要：控制台里「Base directory」必须留空（仓库根），「Publish directory」填 dist。
# 若 Base 误设为 dist，日志里会出现 base=/opt/build/repo/dist、publish=.../dist/dist，
# 且 bash ./scripts/postbuild.sh 找不到（脚本在仓库根 scripts/，不在 dist/scripts）。
#
# 下面先 cd 到 git 仓库根，即使 Base 被误设也能跑对命令；但 Publish 仍须在控制台改回「相对仓库根的 dist」。
#
# postbuild 用 bash 直接执行，减轻部分环境下 pnpm 收尾的 uv_cwd ENOENT。
[build]
command = "pnpm install --no-frozen-lockfile && pnpm run build && bash ./scripts/postbuild.sh"
publish = "dist"

