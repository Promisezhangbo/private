# ==============================================
# 纯静态部署：彻底跳过所有构建/安装
# ==============================================
[build]
  # 1. 跳过构建命令
  command = "# skip build"
  # 2. 直接发布本地 dist 文件夹
  publish = "dist"
  # 3. 【关键】彻底禁用自动依赖安装！
  ignore = "echo 'Skip dependency install'"

# ==============================================
# SPA 路由（解决刷新 404，monorepo 多应用必备）
# ==============================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false