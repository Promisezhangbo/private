# ==============================================
# 纯静态部署：只发布本地 dist，不安装、不构建
# ==============================================
[build]
  # 1. 跳过构建命令（关键）
  command = "# skip build"
  # 2. 发布目录：你本地打包好的 dist
  publish = "dist"
  # 3. 【正确写法】只跳过依赖安装，不跳过部署
  # 原理：用环境变量强制禁用 Netlify 自动安装
  environment = { NETLIFY_USE_PNPM = "false", SKIP_INSTALL = "true" }

# ==============================================
# SPA 路由：解决多子应用刷新 404（Monorepo 必备）
# ==============================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false