<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Loading…</title>
<script>
    // Smart 404 for GitHub Pages (deployed at root)
    // This file is served when a deep-link is requested and the server returns 404.
    // It fetches /index.html and writes it into the document so the SPA can render
    // while preserving the address bar path.
    (function () {
        try {
            var indexUrl = '/index.html';
            fetch(indexUrl, { cache: 'no-store' })
                .then(function (r) {
                    if (!r.ok) throw new Error('index fetch failed');
                    return r.text();
                })
                .then(function (html) {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(function () {
                    // fallback: go to root (this will show the index page)
                    // we avoid an infinite loop by using replace
                    location.replace('/');
                });
        } catch (e) {
            location.replace('/');
        }
    })();
</script>
