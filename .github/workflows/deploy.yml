# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 关键修复：使用官方 pnpm 安装 action（比手动 npm install -g 更稳定）
      - name: Setup Node.js and pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest # 自动安装最新版 pnpm
          run_install: false # 先不安装依赖，后续手动装

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm" # 缓存 pnpm 依赖，加速下次构建

      # 安装依赖（此时 pnpm 已在 PATH 中）
      - name: Install dependencies
        run: pnpm install

      # 构建应用（确认 package.json 中的脚本是 "build"，不是 "build:all"）
      - name: Build all apps
        run: pnpm run build

      # 部署到 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
