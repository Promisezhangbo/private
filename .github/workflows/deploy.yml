# 部署到 GitHub Pages(手动触发)
# - all：与本地 pnpm run build + postbuild 一致；会构建 workspace 内全部 apps/*(新增应用只要有 package.json 即会参与构建，无需改本文件)。
# - 单个子应用：拉取当前 gh-pages，只覆盖 dist/<app>/；app 名称为 apps 下目录名(与 pnpm --filter 一致)。
# 说明：工作流文件须在默认分支上，Actions 里才会出现「Run workflow」。
name: GitHub 部署

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "要检出并构建的分支(须已推送)"
        required: true
        default: main
        type: string
      scope:
        description: "部署范围：填 all 构建全部子应用；或填任一子应用目录名(main、login、blog、agent、skill、resume …)"
        required: true
        default: all
        type: string

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install -no-frozen-lockfile

      - name: Validate deploy scope
        run: node scripts/deploy/validate_deploy_scope.mjs "${{ github.event.inputs.scope }}"

      - name: Build(全部子应用)
        if: github.event.inputs.scope == 'all'
        run: TZ='Asia/Shanghai' pnpm run build

      - name: Post-build(根目录 index / 404 / _redirects)
        if: github.event.inputs.scope == 'all'
        run: pnpm run postbuild

      - name: Build(单个子应用)
        if: github.event.inputs.scope != 'all'
        run: TZ='Asia/Shanghai' pnpm --filter ${{ github.event.inputs.scope }} build

      - name: Post-build(仅单应用 main,生成根 index / 404 / _redirects)
        if: github.event.inputs.scope == 'main'
        run: pnpm run postbuild

      - name: 合并 gh-pages(仅单应用部署)
        if: github.event.inputs.scope != 'all'
        run: bash scripts/deploy/merge_app_dist_to_deploy.sh "${{ github.event.inputs.scope }}"

      - name: Generate deploy banner
        env:
          BUILD_BRANCH: ${{ github.event.inputs.branch }}
        run: node scripts/deploy/build_tag_info.js "${{ github.event.inputs.scope }}"

      - name: Verify dist
        run: |
          echo '📂 dist 目录:'
          ls -la ./dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          force_orphan: true
          clean: true
          clean_keep: ".git"
          exclude_assets: |
            README.md
            LICENSE
            .gitignore
            package.json
