# 部署到 GitHub Pages（仅手动触发：仓库 → Actions → 本工作流 → Run workflow）
# 说明：工作流文件须存在于仓库的默认分支（如 main），才能在 Actions 列表里看到「Run workflow」。
name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '要检出并部署的分支名（须已推送到远程）'
        required: true
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build all apps (Asia/Shanghai)
        run: TZ='Asia/Shanghai' pnpm run build

      - name: Generate build-info & deploy banner
        env:
          BUILD_BRANCH: ${{ github.event.inputs.branch }}
        run: node scripts/build_info.js

      - name: Verify dist
        run: |
          echo '📂 dist 目录：'
          ls -la ./dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: true
          clean: true
          clean_keep: '.git'
          exclude_assets: |
            README.md
            LICENSE
            .gitignore
            package.json
