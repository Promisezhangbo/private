# 部署到 GitHub Pages（手动触发）
# - 全部：与本地 pnpm run build + postbuild 一致，整站 dist 上传。
# - 单个子应用：拉取当前 gh-pages，只覆盖 dist/<app>/，其它子应用目录保留（适合热修某个微应用）。
# 说明：工作流文件须在默认分支上，Actions 里才会出现「Run workflow」。
name: 部署到github pages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "要检出并构建的分支（须已推送）"
        required: true
        default: main
        type: string
      scope:
        description: "部署范围"
        required: true
        default: all
        type: choice
        options:
          - all
          - main
          - login
          - blog
          - agent

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install -no-frozen-lockfile

      - name: Build（全部子应用）
        if: github.event.inputs.scope == 'all'
        run: TZ='Asia/Shanghai' pnpm run build

      - name: Post-build（根目录 index / 404 / _redirects）
        if: github.event.inputs.scope == 'all'
        run: pnpm run postbuild

      - name: Build（单个子应用）
        if: github.event.inputs.scope != 'all'
        run: TZ='Asia/Shanghai' pnpm --filter ${{ github.event.inputs.scope }} build

      - name: Post-build（仅单应用 main，生成根 index / 404 / _redirects）
        if: github.event.inputs.scope == 'main'
        run: pnpm run postbuild

      - name: 合并 gh-pages（仅单应用部署）
        if: github.event.inputs.scope != 'all'
        run: bash scripts/merge-gh-pages-app.sh "${{ github.event.inputs.scope }}"

      - name: Generate deploy banner
        env:
          BUILD_BRANCH: ${{ github.event.inputs.branch }}
        run: node scripts/build_info.js

      - name: Verify dist
        run: |
          echo '📂 dist 目录：'
          ls -la ./dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          force_orphan: true
          clean: true
          clean_keep: ".git"
          exclude_assets: |
            README.md
            LICENSE
            .gitignore
            package.json
