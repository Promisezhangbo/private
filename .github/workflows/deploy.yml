# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '部署的分支（默认main）'
        required: true
        default: 'main'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js and pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      # ========== 原有 Build 步骤 ==========
      - name: Build all apps (with Asia/Shanghai timezone)
        run: TZ='Asia/Shanghai' pnpm run build
        # ========== 核心：执行独立的预构建脚本 ==========
      - name: Run build info script (generate files in dist)
        env:
          # 传递 CI 分支参数到 Node 脚本（关键）
          BUILD_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          # 执行独立的 Node.js 脚本
          node ../../scripts/build_info.js
      # ========== 验证：打印 dist 目录文件（可选） ==========
      - name: Verify dist files
        run: |
          echo "📂 dist 目录文件列表："
          ls -la ./dist
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: true
          clean: true
          clean_keep: '.git'
          exclude_assets: |
            README.md
            LICENSE
            .gitignore
            package.json
