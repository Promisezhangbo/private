    SearchKnowledgeConfig:
      required:
        - dataset_list
        - top_k
        - confidence
        - weight
      type: object
      properties:
        dataset_list:
          type: array
          items:
            $ref: "#/components/schemas/DatasetSelector"
          description: List of datasets to be searched.
        top_k:
          type: integer
          description: Top k of result.
          format: int32
        confidence:
          type: number
          description: Confidence.
          format: float
        weight:
          type: number
          description: "Semantic Retrieval: Returns content that matches the meaning of the query rather than the literal meaning of the query. It is recommended for scenarios that require contextual relevance and intent relevance. Full-Text Retrieval: Uses an inverted index strategy for retrieval, recommended for scenarios where precise keyword matching is needed. Weight: The weight represents the proportion between the two methods, with valid values ranging from 0 to 1. The larger the value, the greater the weight given to full-text retrieval, and the smaller the weight for semantic retrieval."
          format: float
        open_window:
          type: boolean
          description: Should the preceding and following segments of the retrieved segment be included in the prompt? If so, the retrieval will be more comprehensive but consume more tokens.
        tags:
          type: array
          items:
            type: string
          description: Filter by tag list.
        creators:
          type: array
          items:
            type: string
          description: Filter by creators.
        database_ids:
          type: array
          items:
            type: string
          description: With databases.
      description: Configuration of knowledge searching.
    SearchKnowledgeRequest:
      required:
        - page_size
        - page_token
      type: object
      properties:
        config:
          $ref: "#/components/schemas/SearchKnowledgeConfig"
        page_size:
          type: integer
          description: Size per page
          format: int32
        page_token:
          type: string
          description: Paging token; do not pass if starting from the beginning.
        keyword:
          type: string
          description: The text want to retrieve.
        query:
          $ref: "#/components/schemas/Query"
      description: Rag search request.
    SearchKnowledgeResponse:
      type: object
      properties:
        docs:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSearchResult"
          description: Doc result list
        next_page_token:
          type: string
          description: next_page_token field used for pagination.
        tokens:
          type: array
          items:
            type: string
          description: Token list for segmentation.
      description: Dataset rag search response.
    SearchSegmentsRequest:
      required:
        - parent
      type: object
      properties:
        parent:
          type: string
          description: "The parent of the segment to retrieve. Format: datasets/{dataset_id}/documents/{document_id}."
        keyword:
          type: string
          description: Support keyword search
        page_token:
          type: string
          description: The starting value of the current page.
        page_size:
          type: integer
          description: Page size for this request.
          format: int32
        order_by:
          type: string
          description: "Sorting keyword, like: create_time desc."
        group:
          type: string
          description: group
      description: Search segments request.
    SearchTableDataResponse:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/DocumentTableColumn"
          description: Table column information
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Segment"
          description: List of table rows
        total_size:
          type: integer
          description: Total count of matching rows
          format: int32
        next_page_token:
          type: string
          description: Token for retrieving the next page of results
      description: Response message for searching table data
    Segment:
      type: object
      properties:
        segment_id:
          readOnly: true
          type: string
          description: Segment ID
        dataset_id:
          readOnly: true
          type: string
          description: Dataset ID
        document_id:
          readOnly: true
          type: string
          description: Doc ID
        content:
          readOnly: true
          type: string
          description: Segment content
        token_count:
          readOnly: true
          type: integer
          description: Token count
          format: int32
        number:
          readOnly: true
          type: integer
          description: Segment num
          format: int32
        metadata:
          $ref: "#/components/schemas/SegmentMetadata"
        words:
          readOnly: true
          type: integer
          description: Word count
          format: int32
        segment_type:
          readOnly: true
          enum:
            - SEGMENT_TYPE_UNSPECIFIED
            - SEGMENT_TYPE_TEXT
            - SEGMENT_TYPE_IMAGE
            - SEGMENT_TYPE_TABLE
            - SEGMENT_TYPE_WEB_IMAGE
            - SEGMENT_TYPE_STRUCTURED_DATA
            - SEGMENT_TYPE_QA
            - SEGMENT_TYPE_ONLINE_SEARCH
          type: string
          description: Segment type
          format: enum
        table_content:
          readOnly: true
          type: string
          description: Table content
        image_key:
          readOnly: true
          type: string
          description: Image key
        image_uri:
          readOnly: true
          type: string
          description: Image URI
        display_type:
          readOnly: true
          enum:
            - DISPLAY_TYPE_UNSPECIFIED
            - DISPLAY_TYPE_TEXT
            - DISPLAY_TYPE_MARKDOWN
            - DISPLAY_TYPE_TABLE
          type: string
          description: Display type
          format: enum
        image_keys:
          readOnly: true
          type: array
          items:
            type: string
          description: Image keys
        display_content:
          readOnly: true
          type: string
          description: Display content
        structured_data:
          $ref: "#/components/schemas/DocumentTableRow"
        answer:
          readOnly: true
          type: string
          description: Segment answer for type of QA
        excluded_embed_metadata_keys:
          readOnly: true
          type: array
          items:
            type: string
          description: excluded_embed_metadata_keys (list[string])
        excluded_llm_metadata_keys:
          readOnly: true
          type: array
          items:
            type: string
          description: excluded_llm_metadata_keys (list[string])
        parent:
          readOnly: true
          type: string
          description: parent id
        children:
          readOnly: true
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ChildrenList"
          description: children ids
        meta:
          readOnly: true
          type: string
          description: meta is json
        global_meta:
          readOnly: true
          type: string
          description: global_meta is json
        is_active:
          type: boolean
          description: Segment Status
        group:
          type: string
          description: group
      description: Segment details
    SegmentMetadata:
      type: object
      properties:
        key_words:
          readOnly: true
          type: array
          items:
            type: string
          description: Key words
        image_name_value:
          readOnly: true
          type: string
          description: Image name
        image_size:
          readOnly: true
          type: integer
          description: Image size
          format: int32
        table_name_value:
          readOnly: true
          type: string
          description: Table name
        table_rows:
          readOnly: true
          type: integer
          description: Table rows
          format: int32
        table_columns:
          readOnly: true
          type: array
          items:
            type: string
          description: Table columns
        score:
          readOnly: true
          type: number
          description: Score
          format: float
        src:
          readOnly: true
          type: string
          description: Source url if from online search
        title:
          readOnly: true
          type: string
          description: Web page title.
        white_src:
          readOnly: true
          type: string
          description: Web source name.
        icon:
          readOnly: true
          type: string
          description: Web source icon.
      description: Metadata details
    SegmentStrategy:
      type: object
      properties:
        chunk_size:
          type: integer
          description: chunk_size is the maximum number of tokens allowed in a segment. Larger chunks provide more context but may be less focused for retrieval.
          format: int32
        chunk_overlap:
          type: integer
          description: chunk_overlap is the number of tokens allowed to overlap between segments. Overlap helps maintain context continuity across segment boundaries.
          format: int32
        separators:
          type: array
          items:
            type: string
          description: 'separators is the list of separators used for segmenting the text. Common separators include: ".", "!", "?", "\n\n", etc.'
      description: Segment strategy parameters, adjustable for the knowledge segmentation method. Controls how documents are broken down into smaller, manageable pieces.
    SetDefaultDatasetRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: Dataset name.
      description: Request of SetDefaultDataset API.
    StartJobRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: "The name of start job. Format: datasets/{dataset_id}/jobs/{job_id}"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentInfo"
          description: The fileList of failed files uploaded to aoss temporary path.
        failed_file_size:
          type: integer
          description: The size of failed files uploaded to aoss temporary path.
          format: int64
        failed_file_count:
          type: integer
          description: The count of failed files uploaded to aoss temporary path.
          format: int64
        document_id:
          type: string
          description: Doc ID to which data is appended
        start_mode:
          enum:
            - DEFAULT
            - UPLOAD
          type: string
          description: Start mode
          format: enum
      description: Start Task Request.
    SuspendJobRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: "Job identifier, format: datasets/{dataset_id}/jobs/{job_id}"
      description: Request to suspend a job
    TableColumn:
      type: object
      properties:
        name:
          type: string
          description: Column identifier/name
        type:
          type: string
          description: Data type (e.g. "STRING", "INT64", "FLOAT")
        role:
          enum:
            - COLUMN_ROLE_UNSPECIFIED
            - PRIMARY_KEY
            - FOREIGN_KEY
            - INDEX
            - NORMAL
          type: string
          description: Semantic role of the column in the table
          format: enum
        reference_table:
          type: string
          description: Referenced table name, if this is a foreign key column
        reference_column:
          type: string
          description: Referenced column name, if this is a foreign key column
        nullable:
          type: boolean
          description: Whether the column allows NULL values
        default_value:
          type: string
          description: Default value for the column, if any
        is_primary_key:
          type: boolean
          description: True if this column is part of the primary key
        display_name:
          type: string
          description: Optional human-readable label for display purposes
      description: Metadata for one column/field in a table. Describes the structure and properties of a table column
    TableField:
      type: object
      properties:
        columnname:
          type: string
          description: Name
        column_number:
          type: integer
          description: Column number
          format: int32
        datatype:
          type: integer
          description: Data type identifier for the field
          format: int32
        desc:
          type: string
          description: Description of the field
        sample:
          type: string
          description: Sample value for the field
        index_key:
          type: boolean
          description: Whether this field is an index key
      description: TableField message
    TableInfo:
      type: object
      properties:
        id:
          type: string
