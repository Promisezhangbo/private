          description: Creation timestamp (ISO 8601 e.g. "2025-06-18T12:34:56Z").
        updated_time:
          type: string
          description: Last update timestamp (ISO 8601).
        creator_user_id:
          type: string
          description: ID of the user who created this database.
        creator_user_name:
          type: string
          description: Name of the creator.
