          format: int64
        document_state:
          enum:
            - DOCUMENT_STAGE_UNSPECIFIED
            - DOCUMENT_PARSING
            - DOCUMENT_PARSE_SUCCESSFULLY
            - DOCUMENT_PARSING_FAILED
            - DOCUMENT_PARSING_CANCELLED
            - DOCUMENT_QUEUED
            - DOCUMENT_CRAWLING
            - DOCUMENT_CRAWLING_FAILED
            - DOCUMENT_FAILED
            - DOCUMENT_CRAWLING_QUEUED
            - DOCUMENT_UPLOADED
          type: string
