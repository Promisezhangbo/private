        name:
          type: string
          description: Table name
        database_name:
          type: string
          description: Parent database name
        database_id:
          type: string
          description: Parent database ID
        row_count:
          type: integer
          description: Total number of rows in the table
          format: int64
        created_time:
          type: string
          description: Creation timestamp (ISO 8601)
        updated_time:
          type: string
          description: Last update timestamp (ISO 8601)
        creator_user_id:
          type: string
          description: ID of the user who created this table
        creator_user_name:
          type: string
          description: Creator's name
      description: Metadata for a single table within a database. Contains essential information about a table structure
    TableRow:
      type: object
      properties:
        cells:
          type: object
          additionalProperties:
            type: string
          description: "Key: column name; Value: cell content as string"
      description: Represents a row's column-value mapping. Contains the actual data for one table row
    UnsetDefaultDatasetRequest:
      required:
        - name
