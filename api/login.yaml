          readOnly: true
          type: string
          description: Display name of dataset.
        type:
          readOnly: true
          enum:
            - DATASET_TYPE_UNSPECIFIED
            - DATASET_TYPE_TEXT
            - DATASET_TYPE_TABLE
            - DATASET_TYPE_GRAPH
          type: string
          description: Type of dataset.
          format: enum
      description: Dataset selector
    DeleteDatabaseResponse:
