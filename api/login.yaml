      description: Callback Job Request.
    CallbackTaskRequest:
      required:
        - parent
        - task_id
        - is_succeed
      type: object
      properties:
        parent:
          type: string
          description: The parent of the task to callback. Format:datasets/{dataset_id}.
        task_id:
          enum:
            - TASK_TYPE_UNSPECIFIED
            - DELETE_DATASET
            - DELETE_DOCUMENT
            - DELETE_SEGMENT
            - COLLECTION_DOCUMENT
          type: string
          description: Task type.
          format: enum
        task_type:
          enum:
            - TASK_TYPE_UNSPECIFIED
            - DELETE_DATASET
            - DELETE_DOCUMENT
            - DELETE_SEGMENT
            - COLLECTION_DOCUMENT
          type: string
          description: Task type.
          format: enum
        is_succeed:
          type: boolean
          description: Is the task succeed.
        error_msg:
          type: string
          description: error message.
      description: Callback Job Request.
    CancelJobRequest:
      required:
        - name
