        relpath:
          type: string
          description: Relative path of the file within the job
        list:
          type: array
          items:
            $ref: "#/components/schemas/MultipartUploadPart"
          description: List of completed upload parts with their ETags
      description: Request to complete a multipart file upload
    CreateDatabaseRequest:
      type: object
      properties:
        name:
          type: string
          description: Human-readable name for the database
        description:
          type: string
          description: Optional description of the database
        source_type:
          type: string
          description: Type of data source (e.g., "mysql", "postgresql", "oracle")
        db_type:
          type: string
          description: Database engine type (e.g., "mysql", "postgresql")
        tags:
          type: array
          items:
            type: string
          description: Custom tags for categorization
        username:
          type: string
          description: Database connection username
        password:
          type: string
          description: Database connection password
        host:
          type: string
          description: Database server hostname or IP address
        port:
          type: integer
          description: Database server port number
          format: int32
        db_name:
          type: string
          description: Name of the specific database to connect to
      description: Request body for CreateDatabase. Contains all necessary information to create a new database connection
    CreateDatabaseResponse:
      type: object
      properties:
        message:
          type: string
          description: Success or error message
        database_id:
          type: string
          description: Unique identifier of the newly created database
      description: Response body for CreateDatabase. Confirms successful database creation
    Dataset:
      required:
        - type
      type: object
      properties:
        name:
          type: string
          description: "The resource name of the dataset. Full resource path in the format: datasets/{dataset} This is the canonical identifier used in API calls and resource references."
        dataset_id:
          readOnly: true
          type: string
          description: ID of the dataset. Unique identifier for the dataset. This field is automatically generated by the system and cannot be modified.
        display_name:
          type: string
          description: Display name of the dataset. Human-readable name shown in the UI. This is the friendly name users see when browsing datasets.
        desc:
          type: string
          description: Description of the dataset. Detailed description explaining the purpose, content, and usage of this dataset.
        cover_image:
          type: string
          description: Cover image of the dataset. URL or path to the cover image file. Used for visual representation of the dataset in the UI.
        state:
          readOnly: true
          enum:
            - STATE_UNSPECIFIED
            - CREATING
            - AVAILABLE
            - UNAVAILABLE
          type: string
          description: Dataset state. Current operational status of the dataset. Indicates whether the dataset is being created, available for use, or unavailable.
          format: enum
        is_empty:
          readOnly: true
          type: boolean
          description: Is the dataset empty. Indicates whether the dataset contains any documents. This field is automatically calculated based on document_count.
        document_count:
          readOnly: true
          type: integer
          description: Doc count. Total number of documents uploaded to this dataset. This field is automatically calculated and updated by the system.
          format: int64
        document_size:
          readOnly: true
          type: integer
          description: Doc size. Total size of all documents in the dataset in bytes. This field is automatically calculated and updated by the system.
          format: int64
        segment_count:
          readOnly: true
          type: integer
          description: Segment count. Total number of text segments created from documents. Segments are the atomic units used for retrieval and processing.
          format: int64
        token_count:
          readOnly: true
          type: integer
          description: Token count. Total number of tokens across all documents in the dataset. This field is automatically calculated and updated by the system.
          format: int64
        parsers:
          type: array
          items:
            $ref: "#/components/schemas/ParserConfig"
          description: Parse Doc config. Configuration for document parsing and processing. Defines how documents are parsed, split, and converted into segments. Multiple parsers can be configured for different document types.
        algo:
          $ref: "#/components/schemas/Algo"
        creator:
          readOnly: true
          type: string
          description: Creator. User ID or username who created this dataset. This field is automatically set by the system and cannot be modified.
        create_time:
          readOnly: true
          type: string
          description: Create time. Timestamp when the dataset was first created. This field is automatically set by the system and cannot be modified.
          format: date-time
        update_time:
          readOnly: true
          type: string
          description: Update time. Timestamp when the dataset was last modified. This field is automatically updated by the system whenever any field is changed.
          format: date-time
        acl:
          readOnly: true
          type: array
          items:
            enum:
              - DATASET_ACTION_UNSPECIFIED
              - DATASET_READ
              - DATASET_WRITE
              - DATASET_UPLOAD
            type: string
            format: enum
          description: ACL (Access Control List). List of permissions granted to users or groups. Defines who can read, write, or manage this dataset.
        share_type:
          enum:
            - SHARE_TYPE_UNSPECIFIED
            - SHARE_TYPE_MAINTAINER_IN_TENANT
            - SHARE_TYPE_USER_IN_TENANT
            - SHARE_TYPE_MAINTAINER_ALL
            - SHARE_TYPE_USER_ALL
            - SHARE_TYPE_UPLOADER_IN_TENANT
            - SHARE_TYPE_UPLOADER_ALL
          type: string
          description: Share type. Defines how the dataset is shared across the organization. Controls whether all users have maintainer or user permissions.
          format: enum
        type:
          enum:
            - DATASET_TYPE_UNSPECIFIED
            - DATASET_TYPE_TEXT
            - DATASET_TYPE_TABLE
            - DATASET_TYPE_GRAPH
          type: string
          description: Dataset type. Specifies the type of data contained in this dataset. Determines how the data is processed and what algorithms can be applied.
          format: enum
        tags:
          type: array
          items:
            type: string
          description: Tag list. User-defined tags for categorizing and organizing datasets. Tags help users find and filter datasets more easily.
        default_dataset:
          type: boolean
          description: Is the dataset the default dataset for chat.
      description: dataset params.
    DatasetMember:
      required:
        - role
      type: object
      properties:
        name:
          type: string
          description: "Dataset member name. Format: {name=datasets/{dataset}/members/type/[group|user]/id/{id}/role/{role}}"
        dataset_id:
          readOnly: true
          type: string
          description: Dataset ID.
        user_id:
          readOnly: true
          type: string
          description: User ID.
        user:
          type: string
          description: The cloud management user_name is unique within the tenant and cannot be changed.
        group:
          type: string
          description: The cloud management group_name is unique within the tenant and cannot be changed.
        role:
          $ref: "#/components/schemas/Role"
        create_time:
          readOnly: true
          type: string
          description: Create time of the member.
          format: date-time
        group_id:
          type: string
          description: Group ID.
      description: Dataset member information.
    DatasetSelector:
      required:
