openapi: 3.0.3
info:
  title: blog-server API
  version: 1.0.0
  description: Blog 后端服务接口文档，适配 Swagger / OpenAPI。
servers:
  - url: http://localhost:8000
    description: 本地 Node.js 或 Deno 开发环境
  - url: https://blog-server.promisezhangbo.deno.net
    description: Deno Deploy 生产环境
paths:
  /getBlogList:
    get:
      tags:
        - Blog
      summary: 获取博客列表（分页）
      operationId: getBlogList
      parameters:
        - name: page
          in: query
          description: 页码，从 1 开始
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: 每页条数
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: name
          in: query
          description: 按名称子串筛选（不区分大小写）；不传则不过滤
          schema:
            type: string
            maxLength: 200
      responses:
        '200':
          description: 成功返回分页列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogListPage'
              example:
                items:
                  - id: 1
                    name: 我是一个blog
                    content: null
                    created_at: '2026-01-01T00:00:00.000Z'
                total: 1
                page: 1
                pageSize: 10
        '400':
          description: 分页参数非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: 请求方法不支持
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /getBlog:
    get:
      tags:
        - Blog
      summary: 按 id 获取单条博客
      operationId: getBlog
      parameters:
        - name: id
          in: query
          required: true
          description: 博客主键 id
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: 成功返回单条
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogListItem'
        '400':
          description: 缺少或非法的 id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 不存在该 id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: 请求方法不支持
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /updateBlogName:
    post:
      tags:
        - Blog
      summary: 更新博客名称
      operationId: updateBlogName
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBlogNameRequest'
            example:
              id: 1
              name: name1
      responses:
        '200':
          description: 更新成功，返回当前条目
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogListItem'
              example:
                id: 1
                name: name1
                content: null
                created_at: '2026-01-01T00:00:00.000Z'
        '400':
          description: 请求体非法或校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 指定 id 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: 请求方法不支持
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    BlogListPage:
      type: object
      description: 分页博客列表
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BlogListItem'
        total:
          type: integer
          format: int64
          description: 总条数
        page:
          type: integer
          description: 当前页（从 1 开始）
        pageSize:
          type: integer
          description: 每页条数
      required:
        - items
        - total
        - page
        - pageSize
    UpdateBlogNameRequest:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
      required:
        - id
        - name
    BlogListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Blog ID
          example: 1
        name:
          type: string
          description: Blog 名称
          example: 我是一个blog
        content:
          type: string
          nullable: true
          description: 正文或摘要（可为空）
        created_at:
          type: string
          format: date-time
          nullable: true
          description: 创建时间（ISO 8601）
      required:
        - id
        - name
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: method_not_allowed
        message:
          type: string
          example: POST is not supported
      required:
        - error
        - message
